<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 - 学生成绩管理系统</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="header">
    <h1>学生成绩管理系统</h1>
    <div class="nav">
      <span id="userInfo"></span>
      <a href="/students.html">学生管理</a>
      <a href="/grades.html">成绩管理</a>
      <a href="/stats.html">成绩统计</a>
      <a href="#" id="btnLogout">退出</a>
    </div>
  </div>
  <div class="container">
    <div class="home-grid">
      <a href="/students.html" class="home-item">
        <h3>学生管理</h3>
        <p>添加、修改、删除学生信息</p>
      </a>
      <a href="/grades.html" class="home-item">
        <h3>成绩管理</h3>
        <p>录入与查询学生成绩</p>
      </a>
      <a href="/stats.html" class="home-item">
        <h3>成绩统计</h3>
        <p>查看各科平均分与及格率</p>
      </a>
    </div>
  </div>
  <script src="/static/js/api.js"></script>
  <script>
    var user = checkAdmin();
    if (user) {
      document.getElementById("userInfo").textContent = "欢迎，" + user.username + " | ";
    }
    document.getElementById("btnLogout").onclick = function (e) {
      e.preventDefault();
      logout();
    };
  </script>
</body>
</html>
