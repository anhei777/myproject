<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生管理 - 学生成绩管理系统</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="header">
    <h1>学生成绩管理系统</h1>
    <div class="nav">
      <a href="/index.html">首页</a>
      <a href="/students.html">学生管理</a>
      <a href="/grades.html">成绩管理</a>
      <a href="/stats.html">成绩统计</a>
      <a href="#" id="btnLogout">退出</a>
    </div>
  </div>
  <div class="container">
    <div class="card">
      <h2>添加学生</h2>
      <div class="form-row">
        <input type="text" id="student_no" placeholder="学号">
        <input type="text" id="name" placeholder="姓名">
        <input type="text" id="class_name" placeholder="班级">
        <select id="gender">
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
        <button id="btnAdd">添加</button>
        <button id="btnCancelStudent" class="secondary" type="button" style="display:none">取消</button>
      </div>
      <p class="msg" id="formMsg"></p>
    </div>
    <div class="card">
      <h2>学生列表</h2>
      <div class="form-row">
        <input type="text" id="keyword" placeholder="搜索学号/姓名/班级">
        <button id="btnSearch">搜索</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>学号</th>
            <th>姓名</th>
            <th>班级</th>
            <th>性别</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="studentTable"></tbody>
      </table>
    </div>
    <div class="card">
      <h2>课程管理</h2>
      <div class="form-row">
        <input type="text" id="course_no" placeholder="课程编号">
        <input type="text" id="course_name" placeholder="课程名称">
        <input type="number" id="credit" placeholder="学分" value="3">
        <button id="btnAddCourse">添加课程</button>
        <button id="btnCancelCourse" class="secondary" type="button" style="display:none">取消</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>编号</th>
            <th>课程名</th>
            <th>学分</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="courseTable"></tbody>
      </table>
    </div>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/students.js"></script>
</body>
</html>
